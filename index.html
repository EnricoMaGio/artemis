<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Artemis II Tracker</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; background-color: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0,204,255,0.1); border-top: 3px solid #00ccff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #info-panel { flex: 0 0 auto; padding: 15px 5px; display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 5px; background: #080808; border-bottom: 1px solid #222; }
        #plot-container { flex: 1; width: 100%; position: relative; min-height: 0; }
        #controls { flex: 0 0 auto; padding: 20px 30px; padding-bottom: calc(var(--safe-bottom) + 10px); background: #050505; }
        .data-block { text-align: center; }
        .label { font-family: 'Orbitron'; font-size: 0.5em; color: #00ccff; letter-spacing: 1.5px; }
        .value { font-size: 0.9em; font-weight: bold; font-family: monospace; }
        input[type=range] { width: 100%; cursor: pointer; }
        #plot { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="spinner"></div></div>
    <div id="info-panel">
        <div class="data-block"><div class="label">Time (GMT+2)</div><div id="date" class="value">---</div></div>
        <div class="data-block"><div class="label">Earth Alt</div><div id="alt-e" class="value">---</div></div>
        <div class="data-block"><div class="label">Moon Alt</div><div id="alt-m" class="value">---</div></div>
    </div>
    <div id="plot-container"><div id="plot"></div></div>
    <div id="controls"><input type="range" id="slider" value="0"></div>

    <script>
        let missionData = [], fx, fy, fz;
        const slider = document.getElementById('slider'), dLab = document.getElementById('date'), eLab = document.getElementById('alt-e'), mLab = document.getElementById('alt-m');

        function createSphere(r, color) {
            let x=[], y=[], z=[], res=18;
            for(let i=0; i<=res; i++) {
                let lat = -Math.PI/2 + i*Math.PI/res, r_cos = r*Math.cos(lat), r_sin = r*Math.sin(lat);
                let rx=[], ry=[], rz=[];
                for(let j=0; j<=res; j++){
                    let lon = j*2*Math.PI/res;
                    rx.push(r_cos*Math.cos(lon)); ry.push(r_cos*Math.sin(lon)); rz.push(r_sin);
                }
                x.push(rx); y.push(ry); z.push(rz);
            }
            return {type:'surface', x, y, z, showscale:false, opacity:1, colorscale:[[0,color],[1,color]]};
        }

        function update(idx) {
            const p = missionData[idx];
            const distE = Math.sqrt(p.x**2 + p.y**2 + p.z**2) - 6371;
            const distM = Math.sqrt((p.x-p.mx)**2 + (p.y-p.my)**2 + (p.z-p.mz)**2) - 1737.4;

            dLab.innerText = new Date(p.t).toLocaleString('en-GB', {timeZone:'Europe/Paris'});
            eLab.innerText = Math.round(distE).toLocaleString() + " km";
            mLab.innerText = Math.round(distM).toLocaleString() + " km";

            const moon = createSphere(1737.4, '#d1d1d1');
            moon.x = moon.x.map(r => r.map(v => v + p.mx));
            moon.y = moon.y.map(r => r.map(v => v + p.my));
            moon.z = moon.z.map(r => r.map(v => v + p.mz));

            Plotly.react('plot', [
                createSphere(6371, '#0066ff'), moon,
                {x:fx.slice(0,idx+1), y:fy.slice(0,idx+1), z:fz.slice(0,idx+1), type:'scatter3d', mode:'lines', line:{color:'#0cf', width:4}},
                {x:[p.x], y:[p.y], z:[p.z], type:'scatter3d', mode:'markers', marker:{size:4, color:'#fff'}}
            ], {
                paper_bgcolor:'#050505', margin:{l:0,r:0,b:0,t:0}, uirevision:'1',
                scene:{ aspectmode:'data', xaxis:{color:'#444'}, yaxis:{color:'#444'}, zaxis:{color:'#444'} }
            });
        }

        fetch('missionData.json').then(r => r.json()).then(data => {
            missionData = data.mission;
            slider.max = missionData.length - 1;
            fx = missionData.map(d => d.x); fy = missionData.map(d => d.y); fz = missionData.map(d => d.z);
            
            document.getElementById('loading-screen').style.display = 'none';
            update(0);
            slider.oninput = () => update(parseInt(slider.value));
        });
    </script>
</body>
</html>
