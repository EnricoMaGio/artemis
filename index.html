<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Artemis II & Moon Tracker</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; background: #0b0d17; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #plot { width: 100vw; height: 100vh; }
        .ui-overlay { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 100; background: rgba(11, 13, 23, 0.85); padding: 20px; border-radius: 15px; border: 1px solid #1e2235; backdrop-filter: blur(10px); }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00f2ff; }
        .info-panel { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; letter-spacing: 1px; color: #8a8f9f; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0d17; display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
        .loading-text { font-weight: bold; letter-spacing: 5px; color: #00f2ff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="loading-text">LOADING TRAJECTORIES</div></div>
    <div id="plot"></div>
    <div class="ui-overlay">
        <input type="range" id="timeSlider" min="0" value="0">
        <div class="info-panel">
            <span id="timeLabel">--/--/-- --:--</span>
            <span>ARTEMIS II & MOON LIVE TRACKER</span>
        </div>
    </div>

    <script>
        let missionData, moonData;
        const slider = document.getElementById('timeSlider');
        const label = document.getElementById('timeLabel');
        const loading = document.getElementById('loading-screen');

        // Parametri Luna: Raggio reale in km (1737.4)
        const MOON_RADIUS = 1737.4;
        
        // Generazione geometria sferica per la Luna (Mesh3D)
        function createSphereMesh(radius, divisions) {
            let x = [], y = [], z = [], i = [], j = [], k = [];
            
            // Vertici
            for (let lat = 0; lat <= divisions; lat++) {
                const theta = (lat * Math.PI) / divisions;
                const sinTheta = Math.sin(theta);
                const cosTheta = Math.cos(theta);

                for (let lon = 0; lon <= divisions; lon++) {
                    const phi = (lon * 2 * Math.PI) / divisions;
                    x.push(radius * sinTheta * Math.cos(phi));
                    y.push(radius * sinTheta * Math.sin(phi));
                    z.push(radius * cosTheta);
                }
            }

            // Facce (triangoli)
            for (let lat = 0; lat < divisions; lat++) {
                for (let lon = 0; lon < divisions; lon++) {
                    const first = (lat * (divisions + 1)) + lon;
                    const second = first + divisions + 1;
                    
                    // Primo triangolo della faccia quadrata
                    i.push(first); j.push(second); k.push(first + 1);
                    // Secondo triangolo
                    i.push(second); j.push(second + 1); k.push(first + 1);
                }
            }
            return {x, y, z, i, j, k};
        }

        // Crea la geometria della sfera una volta sola (risoluzione 24 per prestazioni)
        const sphereMesh = createSphereMesh(MOON_RADIUS, 24);

        async function init() {
            try {
                const response = await fetch('missionData.json');
                const data = await response.json();
                missionData = data.mission;
                moonData = data.moon;

                slider.max = missionData.length - 1;

                const layout = {
                    paper_bgcolor: '#0b0d17', plot_bgcolor: '#0b0d17',
                    margin: {l:0, r:0, b:0, t:0},
                    scene: {
                        xaxis: {showgrid: true, gridcolor: '#1e2235', zeroline: false, title: ''},
                        yaxis: {showgrid: true, gridcolor: '#1e2235', zeroline: false, title: ''},
                        zaxis: {showgrid: true, gridcolor: '#1e2235', zeroline: false, title: ''},
                        aspectmode: 'data',
                        camera: { eye: {x: 1.5, y: 1.5, z: 1.2} }
                    },
                    showlegend: true,
                    legend: { x: 0.05, y: 0.9, font: {color: '#fff', size: 10}, bgcolor: 'rgba(0,0,0,0)' }
                };

                await Plotly.newPlot('plot', [], layout, {displayModeBar: false});
                updatePlot(0);
                
                setTimeout(() => { loading.style.opacity = '0'; setTimeout(() => loading.remove(), 500); }, 800);
            } catch (err) { console.error(err); }
        }

        function updatePlot(idx) {
            const sat = missionData[idx];
            const targetTime = new Date(sat.t).getTime();

            // Sincronizzazione Luna
            const moonPos = moonData.reduce((prev, curr) => {
                return Math.abs(new Date(curr.t).getTime() - targetTime) < Math.abs(new Date(prev.t).getTime() - targetTime) ? curr : prev;
            });

            // Trasla la geometria della sfera alla posizione della Luna
            const translatedX = sphereMesh.x.map(v => v + moonPos.x);
            const translatedY = sphereMesh.y.map(v => v + moonPos.y);
            const translatedZ = sphereMesh.z.map(v => v + moonPos.z);

            const traces = [
                {
                    name: 'Artemis II',
                    type: 'scatter3d', mode: 'markers',
                    x: [sat.x], y: [sat.y], z: [sat.z],
                    marker: { size: 6, color: '#00f2ff', symbol: 'circle', line: {color: '#fff', width: 1} }
                },
                {
                    name: 'Luna (Real Radius)',
                    type: 'mesh3d',
                    x: translatedX, y: translatedY, z: translatedZ,
                    i: sphereMesh.i, j: sphereMesh.j, k: sphereMesh.k,
                    color: '#d1d1d1', opacity: 1, flatshading: false,
                    lighting: { diffuse: 0.8, ambient: 0.3, specular: 0.1, roughness: 0.9 }
                }
            ];

            label.innerText = sat.t.replace('Z', '').replace('T', ' ');
            Plotly.react('plot', traces);
        }

        slider.oninput = () => updatePlot(slider.value);
        window.onload = init;
        window.onresize = () => Plotly.Plots.resize('plot');
    </script>
</body>
</html>
