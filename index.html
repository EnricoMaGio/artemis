        const slider = document.getElementById('time-slider');
        const dateLabel = document.getElementById('current-date');
        slider.max = missionData.length - 1;

        function formatRomeTime(utcString) {
            return new Date(utcString).toLocaleString('it-IT', {
                timeZone: 'Europe/Rome',
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function createEarth() {
            const r = 6371;
            let x = [], y = [], z = [];
            const res = 20;
            for(let i=0; i<=res; i++) {
                let lat = -90 + i*180/res;
                let r_z = r * Math.sin(lat * Math.PI / 180);
                let r_cos_lat = r * Math.cos(lat * Math.PI / 180);
                let rowX = [], rowY = [], rowZ = [];
                for(let j=0; j<=res; j++) {
                    let lon = -180 + j*360/res;
                    rowX.push(r_cos_lat * Math.cos(lon * Math.PI / 180));
                    rowY.push(r_cos_lat * Math.sin(lon * Math.PI / 180));
                    rowZ.push(r_z);
                }
                x.push(rowX); y.push(rowY); z.push(rowZ);
            }
            return { type: 'surface', x: x, y: y, z: z, showscale: false, opacity: 0.5, colorscale: [[0, '#001a33'], [1, '#0066ff']], hoverinfo: 'skip' };
        }

        const axisStyle = { showgrid: true, gridcolor: '#222', color: '#555', tickfont: {size: 9} };

        const layout = {
            paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
            scene: {
                xaxis: { ...axisStyle, title: 'X' }, 
                yaxis: { ...axisStyle, title: 'Y' }, 
                zaxis: { ...axisStyle, title: 'Z' },
                aspectmode: 'data'
            },
            showlegend: false
        };

        function updatePlot(index) {
            const idx = parseInt(index);
            const p = missionData[idx];
            dateLabel.innerText = formatRomeTime(p.t);
            
            const past = missionData.slice(0, idx + 1);
            const future = missionData.slice(idx);
            
            Plotly.react('plot', [
                createEarth(),
                {
                    x: past.map(d => d.x), y: past.map(d => d.y), z: past.map(d => d.z),
                    mode: 'lines', line: {color: '#00ccff', width: 4}, type: 'scatter3d'
                },
                {
                    x: future.map(d => d.x), y: future.map(d => d.y), z: future.map(d => d.z),
                    mode: 'lines', line: {color: '#ffcc00', width: 2, dash: 'dash'}, type: 'scatter3d'
                },
                {
                    x: [p.x], y: [p.y], z: [p.z],
                    mode: 'markers', marker: {size: 5, color: '#fff', symbol: 'diamond'}, type: 'scatter3d'
                }
            ], layout);
        }

        const now = new Date().getTime();
        let openIndex = missionData.findIndex(d => new Date(d.t).getTime() >= now);
        if (openIndex === -1) openIndex = missionData.length - 1;
        if (openIndex < 0) openIndex = 0;

        slider.value = openIndex;
        Plotly.newPlot('plot', [], layout, {responsive: true, displayModeBar: false}).then(() => {
            updatePlot(openIndex);
        });

        slider.oninput = function() { updatePlot(this.value); };
        window.addEventListener('resize', () => Plotly.Plots.resize('plot'));
    </script>
