<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Artemis II Precision Tracker</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { margin: 0; background-color: #050505; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(0,204,255,0.1);
            border-top: 3px solid #00ccff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 0.7em; color: #00ccff; letter-spacing: 3px; }

        #info-panel { flex: 0 0 auto; padding: 15px 10px 5px 10px; text-align: center; }
        #plot-container { flex: 1; width: 100%; position: relative; min-height: 300px; }
        #controls { flex: 0 0 auto; padding: 20px 30px; padding-bottom: calc(var(--safe-bottom) + 20px); }

        .label { font-family: 'Orbitron', sans-serif; font-size: 0.6em; color: #00ccff; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 1.1em; font-weight: bold; margin-top: 5px; color: #fff; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; padding: 15px 0; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #00ccff; margin-top: -8px; }
        
        #plot { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status" class="loading-text">LOADING TELEMETRY...</div>
    </div>

    <div id="info-panel">
        <div class="label">Current Time (GMT+2)</div>
        <div id="current-date" class="value">---</div>
    </div>

    <div id="plot-container">
        <div id="plot"></div>
    </div>

    <div id="controls">
        <div class="label">Mission Timeline</div>
        <input type="range" id="time-slider" min="0" value="0" step="1">
    </div>

    <script>
        let missionData = [];
        let fullX = [], fullY = [], fullZ = [];
        
        const slider = document.getElementById('time-slider');
        const dateLabel = document.getElementById('current-date');
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('status');

        // 1. Fetch JSON Data
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                missionData = data;
                fullX = data.map(d => d.x);
                fullY = data.map(d => d.y);
                fullZ = data.map(d => d.z);
                
                statusText.innerText = "INITIALIZING 3D ENGINE...";
                initApp();
            })
            .catch(err => {
                statusText.innerText = "ERROR LOADING DATA";
                console.error(err);
            });

        function formatGMT2(utcString) {
            return new Date(utcString).toLocaleString('en-GB', {
                timeZone: 'Europe/Paris',
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
        }

        function createEarth() {
            const r = 6371;
            let x = [], y = [], z = [];
            const res = 20; 
            for(let i=0; i<=res; i++) {
                let lat = -90 + i*180/res;
                let r_z = r * Math.sin(lat * Math.PI / 180);
                let r_cos_lat = r * Math.cos(lat * Math.PI / 180);
                let rowX = [], rowY = [], rowZ = [];
                for(let j=0; j<=res; j++) {
                    let lon = -180 + j*360/res;
                    rowX.push(r_cos_lat * Math.cos(lon * Math.PI / 180));
                    rowY.push(r_cos_lat * Math.sin(lon * Math.PI / 180));
                    rowZ.push(r_z);
                }
                x.push(rowX); y.push(rowY); z.push(rowZ);
            }
            return { type: 'surface', x: x, y: y, z: z, showscale: false, opacity: 0.4, colorscale: [[0, '#001a33'], [1, '#0066ff']], hoverinfo: 'skip' };
        }

        const layout = {
            paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
            scene: {
                xaxis: { showgrid: false, zeroline: false, color: '#444' },
                yaxis: { showgrid: false, zeroline: false, color: '#444' },
                zaxis: { showgrid: false, zeroline: false, color: '#444' },
                aspectmode: 'data'
            },
            showlegend: false
        };

        function updatePlot(index) {
            const idx = parseInt(index);
            const p = missionData[idx];
            dateLabel.innerText = formatGMT2(p.t);
            
            Plotly.react('plot', [
                createEarth(),
                {
                    x: fullX.slice(0, idx + 1), y: fullY.slice(0, idx + 1), z: fullZ.slice(0, idx + 1),
                    mode: 'lines', line: {color: '#00ccff', width: 3}, type: 'scatter3d'
                },
                {
                    x: [p.x], y: [p.y], z: [p.z],
                    mode: 'markers', marker: {size: 4, color: '#fff'}, type: 'scatter3d'
                }
            ], layout);
        }

        function initApp() {
            slider.max = missionData.length - 1;
            const now = new Date().getTime();
            let openIndex = missionData.findIndex(d => new Date(d.t).getTime() >= now);
            if (openIndex <= 0) openIndex = 0;
            slider.value = openIndex;

            Plotly.newPlot('plot', [], layout, {responsive: true, displayModeBar: false})
                .then(() => {
                    updatePlot(openIndex);
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => loadingScreen.style.display = 'none', 500);
                    }, 500);
                });
        }

        let frameRequested = false;
        slider.oninput = function() {
            if (!frameRequested) {
                frameRequested = true;
                requestAnimationFrame(() => {
                    updatePlot(slider.value);
                    frameRequested = false;
                });
            }
        };
        window.addEventListener('resize', () => Plotly.Plots.resize('plot'));
    </script>
</body>
</html>
