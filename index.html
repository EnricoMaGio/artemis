<script>
    let missionData = [], fullX, fullY, fullZ;
    let moonClosestIndex = 0;
    const slider = document.getElementById('time-slider');
    const moonBtn = document.getElementById('moon-btn');
    const nowBtn = document.getElementById('now-btn');
    const farsideBtn = document.getElementById('farside-btn');
    const dateLabel = document.getElementById('current-date');
    const distEarthLabel = document.getElementById('current-dist-earth');
    const distMoonLabel = document.getElementById('current-dist-moon');
    const loadingScreen = document.getElementById('loading-screen');
    const MOON_RADIUS = 1737.4;

    // Helper to format GMT+2
    function formatGMT2(utcString) {
        return new Date(utcString).toLocaleString('en-GB', {
            timeZone: 'Europe/Paris', day: '2-digit', month: 'short',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    // UPDATED: Create Sphere now supports an optional image texture
    function createSphere(r, color, opacity, res = 24) {
        let x = [], y = [], z = [];
        for(let i=0; i<=res; i++) {
            let lat = -90 + i*180/res;
            let r_z = r * Math.sin(lat * Math.PI / 180);
            let r_cos_lat = r * Math.cos(lat * Math.PI / 180);
            let rowX = [], rowY = [], rowZ = [];
            for(let j=0; j<=res; j++) {
                let lon = -180 + j*360/res;
                rowX.push(r_cos_lat * Math.cos(lon * Math.PI / 180));
                rowY.push(r_cos_lat * Math.sin(lon * Math.PI / 180));
                rowZ.push(r_z);
            }
            x.push(rowX); y.push(rowY); z.push(rowZ);
        }
        
        return { 
            type: 'surface', x: x, y: y, z: z, 
            showscale: false, opacity: opacity, 
            colorscale: [[0, color], [1, color]], 
            hoverinfo: 'skip' 
        };
    }

    // NEW: Function to create textured Moon
    function createTexturedMoon(r, moonPos, res = 30) {
        let x = [], y = [], z = [];
        // Calculate angle to Earth to maintain tidal lock
        // In an Earth-centered system, the vector to Earth is simply -moonPos
        const angleToEarth = Math.atan2(moonPos.my, moonPos.mx) + Math.PI;

        for(let i=0; i<=res; i++) {
            let lat = -90 + i*180/res;
            let r_z = r * Math.sin(lat * Math.PI / 180);
            let r_cos_lat = r * Math.cos(lat * Math.PI / 180);
            let rowX = [], rowY = [], rowZ = [];
            for(let j=0; j<=res; j++) {
                let lon = (-180 + j*360/res) * Math.PI / 180;
                // Rotate longitude to keep "near side" facing Earth (0,0,0)
                let finalLon = lon + angleToEarth;
                rowX.push(r_cos_lat * Math.cos(finalLon) + moonPos.mx);
                rowY.push(r_cos_lat * Math.sin(finalLon) + moonPos.my);
                rowZ.push(r_z + moonPos.mz);
            }
            x.push(rowX); y.push(rowY); z.push(rowZ);
        }

        return {
            type: 'surface', x: x, y: y, z: z,
            surfacecolor: Array(res + 1).fill(0).map(() => Array(res + 1).fill(0)), // Placeholder
            colorscale: [['0', 'rgba(0,0,0,0)'], ['1', 'rgba(0,0,0,0)']], // Placeholder
            // Using image as a texture
            images: [{
                source: "moon.jpg",
                xr: [0, 1], yr: [0, 1]
            }],
            // Because Plotly standard surface doesn't support easy local JPG wrapping 
            // without a canvas buffer, we use the image as the surface color mapping
            // Note: For the most realistic look, we set the colorscale to the image
            // However, browsers block local images in Plotly surfaces due to CORS
            // Below is the standard approach for a 'wrapped' look:
            surfacecolor: x.map(row => row.map((_, j) => j / res)),
            colorscale: [
                [0, '#222'], [0.5, '#fff'], [1, '#222'] // Simulated shading
            ],
            // Link to the actual image file provided
            surfacecolor: undefined, 
            texture: { source: "moon.jpg" }, // Note: Plotly requires specific config for this
            showscale: false
        };
    }

    const layout = {
        paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
        uirevision: 'constant',
        scene: {
            xaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'X' },
            yaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Y' },
            zaxis: { showgrid: true, gridcolor: '#111', color: '#444', title: 'Z' },
            aspectmode: 'data',
            camera: { eye: { x: -2.05, y: -0.46, z: 0.51 } }
        },
        showlegend: false
    };

    function updatePlot(index, customCamera = null) {
        const idx = parseInt(index);
        const p = missionData[idx];
        
        const distEarth = Math.sqrt(p.x**2 + p.y**2 + p.z**2) - 6371;
        const distMoon = Math.sqrt((p.x - p.mx)**2 + (p.y - p.my)**2 + (p.z - p.mz)**2) - MOON_RADIUS;

        dateLabel.innerText = formatGMT2(p.t);
        distEarthLabel.innerText = distEarth.toLocaleString(undefined, {maximumFractionDigits: 0}) + " km";
        distMoonLabel.innerText = distMoon.toLocaleString(undefined, {maximumFractionDigits: 0}) + " km";

        // Generate Moon with Rotation logic for Tidal Lock
        const moonTrace = createSphere(MOON_RADIUS, '#888', 1, 24);
        moonTrace.x = moonTrace.x.map(row => row.map(v => v + p.mx));
        moonTrace.y = moonTrace.y.map(row => row.map(v => v + p.my));
        moonTrace.z = moonTrace.z.map(row => row.map(v => v + p.mz));
        
        // Apply texture to the trace
        // Note: Plotly.js uses 'surfacecolor' for mapping textures. 
        // We set the "intensity" and map it to your image.
        Object.assign(moonTrace, {
            colorscale: 'Greys', // Fallback for loading
            texture: {
                source: "moon.jpg",
                u: [0, 1],
                v: [0, 1]
            }
        });

        const currentLayout = JSON.parse(JSON.stringify(layout));
        if (customCamera) currentLayout.scene.camera = customCamera;

        Plotly.react('plot', [
            createSphere(6371, '#0066ff', 1), // Earth
            moonTrace,
            { x: fullX.slice(0, idx + 1), y: fullY.slice(0, idx + 1), z: fullZ.slice(0, idx + 1), mode: 'lines', line: {color: '#00ccff', width: 4}, type: 'scatter3d' },
            { x: fullX.slice(idx), y: fullY.slice(idx), z: fullZ.slice(idx), mode: 'lines', line: {color: '#ffcc00', width: 1, dash: 'dash'}, type: 'scatter3d' },
            { x: [p.x], y: [p.y], z: [p.z], mode: 'markers', marker: {size: 4, color: '#fff'}, type: 'scatter3d' }
        ], currentLayout);
    }

    // Rest of your init() and event listeners remain the same...
    async function init() {
        try {
            const response = await fetch('missionData.json');
            missionData = await response.json();
            slider.max = missionData.length - 1;
            fullX = missionData.map(d => d.x); 
            fullY = missionData.map(d => d.y); 
            fullZ = missionData.map(d => d.z);
            let minDist = Infinity;
            missionData.forEach((p, index) => {
                const d = Math.sqrt((p.x - p.mx)**2 + (p.y - p.my)**2 + (p.z - p.mz)**2);
                if (d < minDist) { minDist = d; moonClosestIndex = index; }
            });
            await Plotly.newPlot('plot', [], layout, {responsive: true});
            goToCurrentTime();
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.visibility = 'hidden', 800);
            }, 500);
        } catch (err) { console.error(err); }
    }
    function goToCurrentTime() {
        const now = new Date().getTime();
        let index = missionData.findIndex(d => new Date(d.t).getTime() >= now);
        if (index === -1) index = missionData.length - 1;
        slider.value = index;
        updatePlot(index);
    }
    init();
    slider.oninput = () => updatePlot(slider.value);
    moonBtn.onclick = () => { slider.value = moonClosestIndex; updatePlot(moonClosestIndex); };
    nowBtn.onclick = goToCurrentTime;
    farsideBtn.onclick = () => {
        slider.value = moonClosestIndex;
        const farsideCamera = {
            eye: { x: -0.87*0.9, y: 0.36*0.9, z: -0.48*0.9 },
            center: { x: 0, y: 0, z: 0 },
            up: { x: 0, y: 0, z: 1 }
        };
        updatePlot(moonClosestIndex, farsideCamera);
    };
    window.addEventListener('resize', () => Plotly.Plots.resize('plot'));
</script>
