<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Artemis II Live Tracker</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #loading { position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-family: monospace; color: #00ccff; }
        #info-panel { padding: 20px; text-align: center; z-index: 10; }
        #plot-container { flex: 1; position: relative; visibility: hidden; }
        #plot { width: 100%; height: 100%; }
        #controls { padding: 20px 40px; padding-bottom: env(safe-area-inset-bottom, 20px); }
        input[type=range] { width: 100%; accent-color: #00ccff; }
    </style>
</head>
<body>
    <div id="loading">FETCHING TELEMETRY...</div>
    
    <div id="info-panel">
        <div style="font-size:0.7em; color:#00ccff; letter-spacing:2px">GMT+2 TIME</div>
        <div id="current-date" style="font-size:1.2em; font-weight:bold">---</div>
    </div>

    <div id="plot-container"><div id="plot"></div></div>

    <div id="controls">
        <input type="range" id="time-slider" min="0" value="0">
    </div>

    <script>
        // Caricamento ASINCRONO: la pagina appare subito, i dati arrivano dopo
        fetch('points.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('plot-container').style.visibility = 'visible';
                initTracker(data);
            });

        function initTracker(missionData) {
            const slider = document.getElementById('time-slider');
            const dateLabel = document.getElementById('current-date');
            slider.max = missionData.length - 1;

            const fullX = missionData.map(d => d.x);
            const fullY = missionData.map(d => d.y);
            const fullZ = missionData.map(d => d.z);

            const layout = {
                paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
                scene: { 
                    xaxis: {gridcolor:'#111', color:'#444'}, 
                    yaxis: {gridcolor:'#111', color:'#444'}, 
                    zaxis: {gridcolor:'#111', color:'#444'},
                    aspectmode: 'data' 
                }
            };

            function update(idx) {
                const p = missionData[idx];
                dateLabel.innerText = new Date(p.t).toLocaleString('en-GB', {timeZone:'Europe/Paris', hour12:false});
                Plotly.react('plot', [
                    {type:'surface', x:[], y:[], z:[], opacity:0.5}, // Terra (placeholder)
                    {x: fullX.slice(0, idx+1), y: fullY.slice(0, idx+1), z: fullZ.slice(0, idx+1), mode:'lines', line:{color:'#00ccff', width:4}, type:'scatter3d'},
                    {x: [p.x], y: [p.y], z: [p.z], mode:'markers', marker:{size:5, color:'#fff'}, type:'scatter3d'}
                ], layout);
            }

            const now = new Date().getTime();
            let startIdx = missionData.findIndex(d => new Date(d.t).getTime() >= now);
            slider.value = startIdx > 0 ? startIdx : 0;
            
            Plotly.newPlot('plot', [], layout, {responsive:true, displayModeBar:false}).then(() => update(slider.value));
            slider.oninput = () => update(slider.value);
        }
    </script>
</body>
</html>
