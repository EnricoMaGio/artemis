<script>
    let missionData = [], fullX, fullY, fullZ;
    let moonClosestIndex = 0;
    const slider = document.getElementById('time-slider');
    const moonBtn = document.getElementById('moon-btn');
    const nowBtn = document.getElementById('now-btn');
    const farsideBtn = document.getElementById('farside-btn');
    const dateLabel = document.getElementById('current-date');
    const distEarthLabel = document.getElementById('current-dist-earth');
    const distMoonLabel = document.getElementById('current-dist-moon');
    const loadingScreen = document.getElementById('loading-screen');
    const MOON_RADIUS = 1737.4;

    let moonTextureData = null;

    // Helper: Converts moon.jpg into a 2D array of intensity values for Plotly
    function getMoonTexture(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.src = url;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512; // Resolution for texture mapping
                canvas.height = 256;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let intensity = [];
                for (let i = 0; i < canvas.height; i++) {
                    let row = [];
                    for (let j = 0; j < canvas.width; j++) {
                        const idx = (i * canvas.width + j) * 4;
                        // Calculate brightness (average of RGB)
                        row.push((data[idx] + data[idx + 1] + data[idx + 2]) / 3);
                    }
                    intensity.push(row);
                }
                resolve(intensity);
            };
            img.onerror = () => resolve(null);
        });
    }

    function formatGMT2(utcString) {
        return new Date(utcString).toLocaleString('en-GB', {
            timeZone: 'Europe/Paris', day: '2-digit', month: 'short',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    function createSphere(r, color, opacity, res = 30) {
        let x = [], y = [], z = [];
        for(let i=0; i<=res; i++) {
            let lat = -90 + i*180/res;
            let r_z = r * Math.sin(lat * Math.PI / 180);
            let r_cos_lat = r * Math.cos(lat * Math.PI / 180);
            let rowX = [], rowY = [], rowZ = [];
            for(let j=0; j<=res; j++) {
                let lon = -180 + j*360/res;
                rowX.push(r_cos_lat * Math.cos(lon * Math.PI / 180));
                rowY.push(r_cos_lat * Math.sin(lon * Math.PI / 180));
                rowZ.push(r_z);
            }
            x.push(rowX); y.push(rowY); z.push(rowZ);
        }
        return { type: 'surface', x, y, z, showscale: false, opacity, colorscale: [[0, color], [1, color]], hoverinfo: 'skip' };
    }

    const layout = {
        paper_bgcolor: '#050505', margin: {l:0, r:0, b:0, t:0},
        uirevision: 'constant',
        scene: {
            xaxis: { showgrid: true, gridcolor: '#111', color: '#444' },
            yaxis: { showgrid: true, gridcolor: '#111', color: '#444' },
            zaxis: { showgrid: true, gridcolor: '#111', color: '#444' },
            aspectmode: 'data',
            camera: { eye: { x: -2.05, y: -0.46, z: 0.51 } }
        },
        showlegend: false
    };

    function updatePlot(index, customCamera = null) {
        const idx = parseInt(index);
        if (!missionData[idx]) return;
        const p = missionData[idx];
        
        const distEarth = Math.sqrt(p.x**2 + p.y**2 + p.z**2) - 6371;
        const distMoon = Math.sqrt((p.x - p.mx)**2 + (p.y - p.my)**2 + (p.z - p.mz)**2) - MOON_RADIUS;

        dateLabel.innerText = formatGMT2(p.t);
        distEarthLabel.innerText = distEarth.toLocaleString(undefined, {maximumFractionDigits: 0}) + " km";
        distMoonLabel.innerText = distMoon.toLocaleString(undefined, {maximumFractionDigits: 0}) + " km";

        // TIDAL LOCK: Near side faces Earth (0,0,0)
        const angleToEarth = Math.atan2(p.my, p.mx);
        const res = 50; // High poly count for smooth texture
        let mx = [], my = [], mz = [], surfacecolor = [];

        for(let i=0; i<=res; i++) {
            let lat = -90 + i*180/res;
            let r_z = MOON_RADIUS * Math.sin(lat * Math.PI / 180);
            let r_cos_lat = MOON_RADIUS * Math.cos(lat * Math.PI / 180);
            let rowX = [], rowY = [], rowZ = [], rowColor = [];

            for(let j=0; j<=res; j++) {
                let lon_rad = (-180 + j*360/res) * Math.PI / 180 + angleToEarth;
                rowX.push(r_cos_lat * Math.cos(lon_rad) + p.mx);
                rowY.push(r_cos_lat * Math.sin(lon_rad) + p.my);
                rowZ.push(r_z + p.mz);

                // Sample texture data
                if (moonTextureData) {
                    let ty = Math.floor((i/res) * (moonTextureData.length - 1));
                    let tx = Math.floor((j/res) * (moonTextureData[0].length - 1));
                    rowColor.push(moonTextureData[ty][tx]);
                } else {
                    rowColor.push(128); // Mid-grey if not loaded
                }
            }
            mx.push(rowX); my.push(rowY); mz.push(rowZ); surfacecolor.push(rowColor);
        }

        const moonTrace = {
            type: 'surface', x: mx, y: my, z: mz,
            surfacecolor: surfacecolor,
            colorscale: 'Greys', reversescale: false,
            showscale: false, hoverinfo: 'skip',
            lighting: { ambient: 0.6, diffuse: 0.9, roughness: 0.9 }
        };

        const currentLayout = JSON.parse(JSON.stringify(layout));
        if (customCamera) currentLayout.scene.camera = customCamera;

        Plotly.react('plot', [
            createSphere(6371, '#0066ff', 1, 40), // Earth
            moonTrace,
            { x: fullX.slice(0, idx + 1), y: fullY.slice(0, idx + 1), z: fullZ.slice(0, idx + 1), mode: 'lines', line: {color: '#00ccff', width: 4}, type: 'scatter3d' },
            { x: fullX.slice(idx), y: fullY.slice(idx), z: fullZ.slice(idx), mode: 'lines', line: {color: '#ffcc00', width: 1, dash: 'dash'}, type: 'scatter3d' },
            { x: [p.x], y: [p.y], z: [p.z], mode: 'markers', marker: {size: 4, color: '#fff'}, type: 'scatter3d' }
        ], currentLayout);
    }

    async function init() {
        try {
            // Load texture before mission data to prevent grey patterns
            moonTextureData = await getMoonTexture('moon.jpg');
            
            const response = await fetch('missionData.json');
            missionData = await response.json();
            slider.max = missionData.length - 1;
            fullX = missionData.map(d => d.x); 
            fullY = missionData.map(d => d.y); 
            fullZ = missionData.map(d => d.z);

            let minDist = Infinity;
            missionData.forEach((p, index) => {
                const d = Math.sqrt((p.x - p.mx)**2 + (p.y - p.my)**2 + (p.z - p.mz)**2);
                if (d < minDist) { minDist = d; moonClosestIndex = index; }
            });

            await Plotly.newPlot('plot', [], layout, {responsive: true});
            goToCurrentTime();
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.visibility = 'hidden', 800);
        } catch (err) { console.error(err); }
    }

    function goToCurrentTime() {
        const now = new Date().getTime();
        let index = missionData.findIndex(d => new Date(d.t).getTime() >= now);
        if (index === -1) index = missionData.length - 1;
        slider.value = index;
        updatePlot(index);
    }

    init();
    slider.oninput = () => updatePlot(slider.value);
    moonBtn.onclick = () => { slider.value = moonClosestIndex; updatePlot(moonClosestIndex); };
    nowBtn.onclick = goToCurrentTime;
    farsideBtn.onclick = () => {
        const farsideCamera = { eye: { x: -0.8, y: 0.3, z: -0.4 } };
        updatePlot(slider.value, farsideCamera);
    };
    window.addEventListener('resize', () => Plotly.Plots.resize('plot'));
</script>
