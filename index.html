        const slider = document.getElementById('time-slider');
        const dateLabel = document.getElementById('current-date');
        slider.max = missionData.length - 1;

        function formatRomeTime(utcString) {
            return new Date(utcString).toLocaleString('it-IT', {
                timeZone: 'Europe/Rome',
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }

        function createEarth() {
            const r = 6371;
            let lon = [], lat = [];
            for(let i=0; i<=30; i++) {
                lon.push(-180 + i*360/30); lat.push(-90 + i*180/30);
            }
            let x = [], y = [], z = [];
            for(let i=0; i<lat.length; i++) {
                let rx = [], ry = [], rz = [];
                for(let j=0; j<lon.length; j++) {
                    let phi = lat[i] * Math.PI / 180, theta = lon[j] * Math.PI / 180;
                    rz.push(r * Math.sin(phi));
                    rx.push(r * Math.cos(phi) * Math.cos(theta));
                    ry.push(r * Math.cos(phi) * Math.sin(theta));
                }
                x.push(rx); y.push(ry); z.push(rz);
            }
            return {
                type: 'surface', x: x, y: y, z: z,
                showscale: false, opacity: 0.5,
                colorscale: [[0, '#001a33'], [1, '#0066ff']], hoverinfo: 'skip'
            };
        }

        const axisStyle = {
            showgrid: true, gridcolor: '#222', zeroline: false, color: '#666',
            title: { font: { size: 10, color: '#00ccff' } }
        };

        const layout = {
            paper_bgcolor: '#050505',
            margin: {l:0, r:0, b:0, t:0},
            scene: {
                xaxis: { ...axisStyle, title: 'X' },
                yaxis: { ...axisStyle, title: 'Y' },
                zaxis: { ...axisStyle, title: 'Z' },
                aspectmode: 'data'
            },
            showlegend: false,
            autosize: true
        };

        function updatePlot(index) {
            const idx = parseInt(index);
            const p = missionData[idx];
            dateLabel.innerText = formatRomeTime(p.t);

            const past = missionData.slice(0, idx + 1);
            const future = missionData.slice(idx);

            const data = [
                createEarth(),
                {
                    x: past.map(d => d.x), y: past.map(d => d.y), z: past.map(d => d.z),
                    mode: 'lines', line: {color: '#00ccff', width: 4}, type: 'scatter3d'
                },
                {
                    x: future.map(d => d.x), y: future.map(d => d.y), z: future.map(d => d.z),
                    mode: 'lines', line: {color: '#ffcc00', width: 2, dash: 'dash'}, type: 'scatter3d'
                },
                {
                    x: [p.x], y: [p.y], z: [p.z],
                    mode: 'markers', marker: {size: 5, color: '#fff', symbol: 'diamond'}, type: 'scatter3d'
                }
            ];
            Plotly.react('plot', data, layout);
        }

        // Trova indice passato
        const now = new Date().getTime();
        let openIndex = 0;
        for (let i = 0; i < missionData.length; i++) {
            if (new Date(missionData[i].t).getTime() <= now) { openIndex = i; } else { break; }
        }

        slider.value = openIndex;
        Plotly.newPlot('plot', [], layout, {responsive: true, displayModeBar: false}).then(() => {
            updatePlot(openIndex);
        });

        slider.oninput = function() { updatePlot(this.value); };

        // Fix per ridimensionamento finestra
        window.onresize = function() {
            Plotly.Plots.resize('plot');
        };
    </script>
